version: '3.8'

services:
  # 后端服务
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "7539:7539"
    environment:
      - PORT=7539
      - DATABASE_URL=file:/app/apps/api/dev.db
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    volumes:
      - ./apps/api/dev.db:/app/apps/api/dev.db
    restart: unless-stopped

  # 前端服务
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:7539
    depends_on:
      - api
    restart: unless-stopped

